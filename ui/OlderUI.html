<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Malaria Detection AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #04080f;
      --surface:   #0b1220;
      --card:      #0f1c2e;
      --border:    rgba(0,200,255,0.12);
      --cyan:      #00c8ff;
      --cyan-dim:  rgba(0,200,255,0.15);
      --green:     #00ffb2;
      --red:       #ff4e6a;
      --amber:     #ffb830;
      --text:      #dce8f5;
      --muted:     #4a6580;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 24px;
    }

    /* ── Animated background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glowing blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--cyan); top: -100px; left: -120px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #0050ff; bottom: -60px; right: -80px; animation-delay: -5s; }
    .blob-3 { width: 200px; height: 200px; background: var(--green); top: 50%; right: 10%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* ── Card wrapper ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow:
        0 0 0 1px rgba(0,200,255,0.05),
        0 24px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Corner accent ── */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 80px; height: 80px;
      border-top: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
      border-radius: 20px 0 0 0;
      opacity: 0.7;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 60px; height: 60px;
      border-bottom: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
      border-radius: 0 0 20px 0;
      opacity: 0.4;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .icon-wrap {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--cyan-dim);
      border: 1px solid rgba(0,200,255,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg { width: 24px; height: 24px; }
    .header-text h1 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 28px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      position: relative;
      border: 1.5px dashed rgba(0,200,255,0.2);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s;
      background: rgba(0,200,255,0.02);
      margin-bottom: 20px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--cyan);
      background: var(--cyan-dim);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { margin-bottom: 10px; opacity: 0.5; }
    .upload-zone h3 {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .upload-zone p {
      font-size: 11px;
      color: var(--muted);
    }
    .upload-zone .chosen-name {
      display: none;
      margin-top: 8px;
      font-size: 12px;
      color: var(--cyan);
      word-break: break-all;
    }

    /* ── Preview image ── */
    #preview-wrap {
      display: none;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      background: #000;
    }
    #preview-wrap::after {
      content: 'SAMPLE';
      position: absolute;
      top: 8px; right: 8px;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--cyan);
      background: rgba(0,200,255,0.12);
      border: 1px solid rgba(0,200,255,0.2);
      padding: 3px 8px;
      border-radius: 4px;
    }
    #preview {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0080cc 0%, #00c8ff 100%);
      color: #fff;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(0,200,255,0.25);
    }
    .btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(0,200,255,0.4);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result panel ── */
    #result-panel {
      display: none;
      margin-top: 20px;
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .result-label {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
    }
    .result-badge {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .result-body {
      padding: 16px 18px 18px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }
    .conf-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .conf-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .conf-value {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 500;
    }
    .conf-bar-bg {
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    /* ── Error ── */
    #error-msg {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,78,106,0.08);
      border: 1px solid rgba(255,78,106,0.2);
      font-size: 12px;
      color: var(--red);
      text-align: left;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.07em;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <div class="header">
      <div class="icon-wrap">
        <!-- Microscope SVG -->
        <svg viewBox="0 0 24 24" fill="none" stroke="#00c8ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 18h8"/>
          <path d="M3 21h18"/>
          <path d="M9 3l6 6-2 2-6-6 2-2z"/>
          <path d="M15 9l2-2"/>
          <path d="M11 13a4 4 0 1 0 4-4"/>
          <line x1="9" y1="21" x2="9" y2="13"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Malaria Detection AI</h1>
        <p>Blood cell analysis system</p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Upload zone -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="imageInput" accept="image/*"/>
      <div class="upload-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00c8ff" stroke-width="1.4" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <h3>Upload microscope image</h3>
      <p>Drag & drop or click to browse</p>
      <div class="chosen-name" id="chosenName"></div>
    </div>

    <!-- Image preview -->
    <div id="preview-wrap">
      <img id="preview" alt="Preview"/>
    </div>

    <!-- Detect button -->
    <button class="btn" id="detectBtn" onclick="predict()">
      <span class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Detect Malaria</span>
      </span>
    </button>

    <!-- Error -->
    <div id="error-msg"></div>

    <!-- Result -->
    <div id="result-panel">
      <div class="result-header" id="resultHeader">
        <div class="result-dot" id="resultDot"></div>
        <span class="result-label" id="resultLabel"></span>
        <span class="result-badge" id="resultBadge"></span>
      </div>
      <div class="result-body">
        <div class="conf-row">
          <span class="conf-label">Confidence</span>
          <span class="conf-value" id="confValue"></span>
        </div>
        <div class="conf-bar-bg">
          <div class="conf-bar-fill" id="confBar"></div>
        </div>
      </div>
    </div>

    <div class="footer">FOR RESEARCH USE ONLY &nbsp;·&nbsp; NOT A CLINICAL DIAGNOSTIC TOOL</div>

  </div>

  <script>
    const imageInput  = document.getElementById('imageInput');
    const uploadZone  = document.getElementById('uploadZone');
    const previewWrap = document.getElementById('preview-wrap');
    const preview     = document.getElementById('preview');
    const chosenName  = document.getElementById('chosenName');
    const detectBtn   = document.getElementById('detectBtn');
    const spinner     = document.getElementById('spinner');
    const btnText     = document.getElementById('btnText');
    const errorMsg    = document.getElementById('error-msg');
    const resultPanel = document.getElementById('result-panel');

    // Drag-over highlight
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); });

    imageInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      chosenName.textContent = file.name;
      chosenName.style.display = 'block';
      preview.src = URL.createObjectURL(file);
      previewWrap.style.display = 'block';
      // Reset result
      resultPanel.style.display = 'none';
      errorMsg.style.display    = 'none';
    });

    async function predict() {
      if (imageInput.files.length === 0) {
        showError('Please upload a microscope image first.');
        return;
      }

      // Loading state
      setLoading(true);
      errorMsg.style.display    = 'none';
      resultPanel.style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('file', imageInput.files[0]);

        const response = await fetch('http://127.0.0.1:5000/predict', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) throw new Error(`Server error: ${response.status}`);

        const data = await response.json();
        showResult(data.prediction, data.confidence);
      } catch (err) {
        showError('Could not reach the detection server. Make sure the Flask backend is running on port 5000.');
      } finally {
        setLoading(false);
      }
    }

    function showResult(prediction, confidence) {
      const isPositive = prediction.toLowerCase().includes('parasitized') ||
                         prediction.toLowerCase().includes('infected') ||
                         prediction.toLowerCase().includes('positive');
      const color  = isPositive ? '#ff4e6a' : '#00ffb2';
      const bgColor = isPositive ? 'rgba(255,78,106,0.07)' : 'rgba(0,255,178,0.07)';
      const badge  = isPositive ? 'POSITIVE' : 'NEGATIVE';

      document.getElementById('resultHeader').style.background = bgColor;
      document.getElementById('resultDot').style.background    = color;
      document.getElementById('resultDot').style.boxShadow     = `0 0 8px ${color}`;
      document.getElementById('resultLabel').textContent       = prediction;
      document.getElementById('resultLabel').style.color       = color;

      const badgeEl = document.getElementById('resultBadge');
      badgeEl.textContent        = badge;
      badgeEl.style.background   = isPositive ? 'rgba(255,78,106,0.12)' : 'rgba(0,255,178,0.12)';
      badgeEl.style.color        = color;
      badgeEl.style.border       = `1px solid ${color}33`;

      const pct = (confidence * 100).toFixed(1);
      document.getElementById('confValue').textContent   = pct + '%';
      document.getElementById('confValue').style.color   = color;
      document.getElementById('confBar').style.background = color;
      document.getElementById('confBar').style.boxShadow  = `0 0 8px ${color}66`;

      resultPanel.style.display = 'block';
      // Animate bar after paint
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.getElementById('confBar').style.width = pct + '%';
        });
      });
    }

    function showError(msg) {
      errorMsg.textContent    = msg;
      errorMsg.style.display  = 'block';
    }

    function setLoading(on) {
      detectBtn.disabled     = on;
      spinner.style.display  = on ? 'block' : 'none';
      btnText.textContent    = on ? 'Analysing…' : 'Detect Malaria';
    }
  </script>
</body>
</html>
